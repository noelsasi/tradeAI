services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tradeai-postgres
    environment:
      POSTGRES_DB: tradeai
      POSTGRES_USER: tradeai
      POSTGRES_PASSWORD: tradeai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeai -d tradeai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tradeai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: tradeai-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tradeai:tradeai@postgres:5432/tradeai
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai:8000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src

  ai:
    build:
      context: ./services/ai
      dockerfile: Dockerfile
    container_name: tradeai-ai
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
