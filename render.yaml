services:
  # ── Backend API (Node native runtime) ────────────────────────────────────────
  - type: web
    name: tradeai-api
    runtime: node
    rootDir: .                              # repo root — needed for pnpm workspace + packages/types
    buildCommand: corepack enable && corepack prepare pnpm@latest --activate && pnpm install --frozen-lockfile && pnpm --filter api build
    startCommand: node apps/api/dist/index.js
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false           # Neon connection string — set in Render dashboard
      - key: AI_SERVICE_URL
        fromService:
          name: tradeai-ai
          type: web
          property: host
      - key: CORS_ORIGIN
        sync: false           # https://tradeai.nexavinetech.com — set in Render dashboard
      - key: REDIS_URL
        value: ""             # Redis not used; satisfies env schema

  # ── AI / DS Service (Python native runtime) ──────────────────────────────────
  - type: web
    name: tradeai-ai
    runtime: python
    rootDir: services/ai
    pythonVersion: "3.13.0"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false           # Neon connection string — set in Render dashboard
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false           # set in Render dashboard
      - key: MAX_FILE_SIZE_MB
        value: 10
      - key: REQUEST_TIMEOUT_SECONDS
        value: 30
