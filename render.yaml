services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: tradeai-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false           # set manually in Render dashboard — Neon connection string
      - key: AI_SERVICE_URL
        fromService:
          name: tradeai-ai
          type: web
          property: host      # Render injects internal hostname automatically
      - key: CORS_ORIGIN
        sync: false           # set to https://tradeai.nexavinetech.com in dashboard
      - key: REDIS_URL
        value: ""             # Redis not used; keeps env schema happy

  # ── AI / DS Service ──────────────────────────────────────────────────────────
  - type: web
    name: tradeai-ai
    runtime: docker
    dockerfilePath: ./services/ai/Dockerfile
    dockerContext: ./services/ai
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        sync: false           # same Neon connection string as API
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false           # set manually in Render dashboard
      - key: MAX_FILE_SIZE_MB
        value: 10
      - key: REQUEST_TIMEOUT_SECONDS
        value: 30
